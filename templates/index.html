<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Employee Attrition Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <h1>Employee Attrition Prediction</h1>

    <form method="POST">

        <!-- Basic Inputs -->
        <label>Age:</label>
        <input type="number" name="Age" required>

        <label>Business Travel:</label>
        <select name="BusinessTravel">
            <option>Travel_Rarely</option>
            <option>Travel_Frequently</option>
            <option>Non-Travel</option>
        </select>

        <label>Daily Rate:</label>
        <input type="number" name="DailyRate" required>

        <label>Department:</label>
        <select name="Department">
            <option>Sales</option>
            <option>Research & Development</option>
            <option>Human Resources</option>
        </select>

        <label>Distance From Home:</label>
        <input type="number" name="DistanceFromHome" required>

        <label>Education:</label>
        <input type="number" name="Education" required>

        <label>Education Field:</label>
        <input type="text" name="EducationField" required>

        <label>Environment Satisfaction:</label>
        <input type="number" name="EnvironmentSatisfaction" required>

        <label>Gender:</label>
        <select name="Gender">
            <option>Male</option>
            <option>Female</option>
        </select>

        <label>Hourly Rate:</label>
        <input type="number" name="HourlyRate" required>

        <label>Job Involvement:</label>
        <input type="number" name="JobInvolvement" required>

        <label>Job Level:</label>
        <input type="number" name="JobLevel" required>

        <label>Job Role:</label>
        <input type="text" name="JobRole" required>

        <label>Job Satisfaction:</label>
        <input type="number" name="JobSatisfaction" required>

        <label>Marital Status:</label>
        <select name="MaritalStatus">
            <option>Single</option>
            <option>Married</option>
            <option>Divorced</option>
        </select>

        <label>Monthly Income:</label>
        <input type="number" name="MonthlyIncome" required>

        <label>Monthly Rate:</label>
        <input type="number" name="MonthlyRate" required>

        <label>Num Companies Worked:</label>
        <input type="number" name="NumCompaniesWorked" required>

        <label>OverTime:</label>
        <select name="OverTime">
            <option>Yes</option>
            <option>No</option>
        </select>

        <label>Percent Salary Hike:</label>
        <input type="number" name="PercentSalaryHike" required>

        <label>Performance Rating:</label>
        <input type="number" name="PerformanceRating" required>

        <label>Relationship Satisfaction:</label>
        <input type="number" name="RelationshipSatisfaction" required>

        <label>Stock Option Level:</label>
        <input type="number" name="StockOptionLevel" required>

        <label>Total Working Years:</label>
        <input type="number" name="TotalWorkingYears" required>

        <label>Training Times Last Year:</label>
        <input type="number" name="TrainingTimesLastYear" required>

        <label>Work Life Balance:</label>
        <input type="number" name="WorkLifeBalance" required>

        <label>Years At Company:</label>
        <input type="number" name="YearsAtCompany" required>

        <label>Years In Current Role:</label>
        <input type="number" name="YearsInCurrentRole" required>

        <label>Years Since Last Promotion:</label>
        <input type="number" name="YearsSinceLastPromotion" required>

        <label>Years With Current Manager:</label>
        <input type="number" name="YearsWithCurrManager" required>

        <br><br>
        <button type="submit">Predict</button>
    </form>

    <hr>

    <!-- Prediction Output -->
    {% if prediction %}
        <h2>Prediction: {{ prediction }}</h2>
        <h3>Probability: {{ probability }}%</h3>
    {% endif %}

    <!-- SHAP Feature Impact -->
    {% if shap_data %}
        <h2>Top Feature Impact</h2>
        <table border="1" cellpadding="8">
            <tr>
                <th>Feature</th>
                <th>Impact</th>
            </tr>
            {% for item in shap_data %}
            <tr>
                <td>{{ item.feature }}</td>
                <td>{{ item.value }}</td>
            </tr>
            {% endfor %}
        </table>
    {% endif %}

</body>
</html>
